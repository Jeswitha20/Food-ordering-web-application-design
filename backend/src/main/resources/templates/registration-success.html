<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registration Success</title>
</head>
<body style="margin:0;padding:0;background:#f6f7fb;font-family:Arial,Helvetica,sans-serif;">
  <div style="max-width:640px;margin:0 auto;padding:24px;">
    <div style="background:#ffffff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,0.06);overflow:hidden;">
      <div style="padding:22px 24px;background:linear-gradient(135deg,#7c3aed,#22c55e);">
        <h2 style="margin:0;color:#ffffff;font-size:20px;">Welcome to Food Ordering</h2>
        <p style="margin:6px 0 0 0;color:rgba(255,255,255,0.9);font-size:13px;">
          Hi ${userName},
        </p>
      </div>

      <div style="padding:22px 24px;">
        <h3 style="margin:0 0 10px 0;">Your account has been created</h3>
        <p style="margin:0 0 16px 0;color:#444;font-size:14px;line-height:1.55;">
          You can now browse restaurants, add items to your cart, and place orders.
        </p>

        <div style="padding:14px 16px;background:#f8fafc;border-radius:12px;">
          <p style="margin:0;color:#444;font-size:14px;">
            Registered Email: <b>${userEmail}</b>
          </p>
        </div>

        <p style="margin:16px 0 0 0;color:#666;font-size:12.5px;line-height:1.5;">
          Need help? Contact support.
        </p>
      </div>

      <div style="padding:16px 24px;background:#ffffff;border-top:1px solid #eef0f5;">
        <p style="margin:0;color:#999;font-size:12px;">
          Food Ordering Team
        </p>
      </div>
    </div>
  </div>
</body>
</html>
