server.port=8080

# ---- Database (MySQL) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/food_ordering?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:your_username}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# For production consider setting to 'validate' and managing migrations externally.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
# Use a long random secret (at least 32 chars recommended).
jwt.secret=${JWT_SECRET:change-me-to-a-very-long-random-secret}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
# Access token expiration (default: 900000 ms = 15 minutes)

# ---- CORS ----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- Mail (JavaMailSender) ----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_mail}
spring.mail.password=${MAIL_PASSWORD:your_password}
app.mail.from=${MAIL_FROM:your_mail}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.transport.protocol=smtp

